apiVersion: apps/v1
kind: Deployment
metadata: { name: seataudit, labels: { app: seataudit } }
spec:
  replicas: 1
  selector: { matchLabels: { app: seataudit } }
  template:
    metadata: { labels: { app: seataudit } }
    spec:
      containers:
        - name: seataudit
          image: ghcr.io/cognis-digital/seataudit:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: seataudit }
spec:
  selector: { app: seataudit }
  ports: [{ port: 80, targetPort: 8000 }]
